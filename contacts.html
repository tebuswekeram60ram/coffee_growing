<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
        }

        header{
            background-color:#4b2e1e;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background-color:#2f5d34;
            padding:15px;

        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-size:18px;
            font-weight:bold;
        }

        nav a:hover{
            color:gold;
        }

        .contact{
            width:80%;
            margin:40px auto;
            background:white;
            padding:40px;
            border-radius:10px;
        }

        .contact h1{
            color:#2f5d34;
            font-size:40px;
        }

        .contact p{
            font-size:18px;
            line-height:1.8;
        }

        form input,
        form textarea{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            background-color:#2f5d34;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            font-size:16px;
        }

        button:hover{
            background-color:#244828;
        }

        footer{
            background-color:#4b2e1e;

    <p>Email: masakacoffee@gmail.com</p>
    <p>Phone: +256 709004344</p>
    <p>Location: Masaka District, Uganda</p>

    <form>
